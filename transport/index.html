<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Hub | Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <nav class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-xs">
        <div class="flex items-center gap-3">
            <span class="bg-blue-800 text-white font-black text-xs px-2.5 py-1 rounded tracking-wider uppercase">TRANSPORT</span>
            <span class="font-bold text-slate-800 text-lg tracking-tight">Transport Hub <span class="text-slate-400 font-normal">Registry</span></span>
        </div>
        <div class="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-medium">
            Prototype Environment
        </div>
    </nav>

    <div class="max-w-6xl w-full mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-4 bg-white p-6 rounded-2xl border border-slate-200/80 shadow-xs mb-2">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Transport & Logistics Partners</h1>
            <p class="text-sm text-slate-500 mt-1" id="transportCount">Loading active transport providers...</p>
            
            <div class="mt-4 max-w-xl">
                <div class="relative">
                    <input type="text" id="searchInput" oninput="filterTransport()" placeholder="Search by company name, service type, or location..." 
                           class="w-full bg-slate-50 border border-slate-300 rounded-xl pl-4 pr-12 py-3 text-sm focus:outline-none focus:border-blue-700 focus:bg-white transition shadow-inner">
                    <span class="absolute right-4 top-3.5 text-slate-400 text-sm">🔍</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1 bg-white p-5 rounded-2xl border border-slate-200/80 shadow-xs h-fit">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Refine Search</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-2">Service Types</label>
                    <div class="space-y-2 text-sm text-slate-600">
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Road Transport" onchange="filterTransport()" class="rounded text-blue-800 focus:ring-blue-700"> Road Transport</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Air Freight" onchange="filterTransport()" class="rounded text-blue-800 focus:ring-blue-700"> Air Freight</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Maritime Shipping" onchange="filterTransport()" class="rounded text-blue-800 focus:ring-blue-700"> Maritime Shipping</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Warehouse & Distribution" onchange="filterTransport()" class="rounded text-blue-800 focus:ring-blue-700"> Warehouse & Distribution</label>
                    </div>
                </div>

                <hr class="border-slate-100">

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-2">Special Services</label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-600 hover:text-blue-800">
                        <input type="checkbox" id="hazmatFilter" onchange="filterTransport()" class="rounded text-blue-800 focus:ring-blue-700">
                        ⚠️ Hazmat Certified
                    </label>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-3" id="transportListContainer">
            </div>

    </div>

    <script>
        // Transport providers dataset
        const transportProviders = [
            { name: "SWIFT LOGISTICS PTY LTD", date: "26 Jun 2026", service: "Road Transport", region: "Sydney Metro", hazmat: true },
            { name: "SKYWAY FREIGHT INTERNATIONAL", date: "25 Jun 2026", service: "Air Freight", region: "National", hazmat: false },
            { name: "OCEANIC SHIPPING LINES", date: "24 Jun 2026", service: "Maritime Shipping", region: "Port Cities", hazmat: true },
            { name: "CENTRAL DISTRIBUTION NETWORK", date: "26 Jun 2026", service: "Warehouse & Distribution", region: "Regional NSW", hazmat: false },
            { name: "ELITE COURIER EXPRESS", date: "23 Jun 2026", service: "Road Transport", region: "Metro & Regional", hazmat: false },
            { name: "PREMIUM COLD CHAIN LOGISTICS", date: "25 Jun 2026", service: "Warehouse & Distribution", region: "Statewide", hazmat: true }
        ];

        function filterTransport() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const checkedServices = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                                           .map(cb => cb.value)
                                           .filter(v => v !== 'on');
            const requireHazmat = document.getElementById('hazmatFilter').checked;

            const container = document.getElementById('transportListContainer');
            container.innerHTML = '';

            // Filter logic
            const filtered = transportProviders.filter(provider => {
                const matchesSearch = provider.name.toLowerCase().includes(searchQuery) || provider.region.toLowerCase().includes(searchQuery);
                const matchesService = checkedServices.length === 0 || checkedServices.includes(provider.service);
                const matchesHazmat = !requireHazmat || provider.hazmat;
                
                return matchesSearch && matchesService && matchesHazmat;
            });

            // Update Counter
            document.getElementById('transportCount').innerText = `${filtered.length} total transport providers matching criteria`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border border-slate-200 text-center py-12 rounded-2xl text-slate-400 text-sm">
                        No transport providers match your exact filtering query.
                    </div>
                `;
                return;
            }

            // Build listing cards
            filtered.forEach(provider => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 hover:border-blue-600/40 p-5 rounded-2xl transition shadow-xs flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4";
                
                card.innerHTML = `
                    <div class="space-y-1">
                        <h3 class="font-extrabold text-blue-900 text-base tracking-tight hover:underline cursor-pointer">${provider.name}</h3>
                        <p class="text-xs font-mono text-slate-400">Updated: ${provider.date} • <span class="text-slate-600 font-sans">${provider.region}</span></p>
                        <div class="pt-1">
                            <span class="bg-slate-100 text-slate-700 text-[10px] px-2.5 py-1 rounded font-medium border border-slate-200">
                                ${provider.service}
                            </span>
                        </div>
                    </div>
                    
                    ${provider.hazmat ? `
                        <div class="flex items-center gap-1.5 bg-amber-50 border border-amber-200 text-amber-800 text-[11px] font-semibold px-3 py-1 rounded-full shrink-0 shadow-2xs">
                            <span class="text-amber-600">⚠️</span> Hazmat Certified
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        // Initialize view on load
        filterTransport();
    </script>
</body>
</html>
